app = "bx-auth-service"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "apps/auth-service/Dockerfile"

[env]
  PORT     = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https   = false
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
