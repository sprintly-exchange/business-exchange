app = "bx-gateway"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "apps/gateway/Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  AUTH_SERVICE_URL         = "http://bx-auth-service.internal:3001"
  PARTNER_SERVICE_URL      = "http://bx-partner-service.internal:3002"
  SUBSCRIPTION_SERVICE_URL = "http://bx-subscription-service.internal:3003"
  INTEGRATION_SERVICE_URL  = "http://bx-integration-service.internal:3004"
  MAPPING_ENGINE_URL       = "http://bx-mapping-engine.internal:3005"
  AGENT_ORCHESTRATOR_URL   = "http://bx-agent-orchestrator.internal:3006"
  BILLING_SERVICE_URL      = "http://bx-billing-service.internal:3007"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
