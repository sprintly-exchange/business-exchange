app = "bx-integration-service"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                = "3004"
  NODE_ENV            = "production"
  MAPPING_ENGINE_URL  = "http://bx-mapping-engine.internal:3005"

[http_service]
  internal_port = 3004
  force_https   = false
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      path = "/health"
      protocol = "http"
      timeout = "5s"
      success_threshold = 1
      failure_threshold = 3

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
