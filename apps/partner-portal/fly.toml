app = "bx-partner-portal"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://bx-gateway.fly.dev"

[env]
  PORT     = "3100"
  NODE_ENV = "production"

[http_service]
  internal_port = 3100
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
      grace_period = "30s"
      interval = "30s"
      method = "GET"
      path = "/api/health"
      protocol = "http"
      timeout = "10s"
      success_threshold = 1
      failure_threshold = 3

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
