app = "bx-partner-portal"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "apps/partner-portal/Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://bx-gateway.fly.dev"

[env]
  PORT     = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
