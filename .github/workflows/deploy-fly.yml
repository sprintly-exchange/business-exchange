name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI

concurrency:
  group: fly-deploy
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  # ── 1. Run DB migrations first ─────────────────────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run migration SQL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Use flyctl ssh console to run psql inside the partner-service container
        # (partner-service has psql available via pg client in the image, OR
        #  we run against Fly Postgres directly with the connection string)
        run: |
          flyctl postgres connect \
            --app bx-postgres \
            --command "$(cat packages/database/migrations/001_schema.sql)"
        continue-on-error: true   # idempotent — safe to re-run

  # ── 2. Deploy backend services in parallel ─────────────────────────────────
  deploy-backend:
    name: Deploy ${{ matrix.app }}
    needs: migrate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false           # keep deploying other services if one fails
      matrix:
        include:
          - app: bx-auth-service
            dir: apps/auth-service
          - app: bx-partner-service
            dir: apps/partner-service
          - app: bx-subscription-service
            dir: apps/subscription-service
          - app: bx-integration-service
            dir: apps/integration-service
          - app: bx-mapping-engine
            dir: apps/mapping-engine
          - app: bx-agent-orchestrator
            dir: apps/agent-orchestrator
          - app: bx-billing-service
            dir: apps/billing-service

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.app }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app ${{ matrix.app }} \
            --config ${{ matrix.dir }}/fly.toml \
            --remote-only \
            --wait-timeout 180

  # ── 3. Deploy gateway (after all backend services are up) ──────────────────
  deploy-gateway:
    name: Deploy gateway
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy bx-gateway
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app bx-gateway \
            --config apps/gateway/fly.toml \
            --remote-only \
            --wait-timeout 180

  # ── 4. Deploy portal (after gateway is confirmed up) ───────────────────────
  deploy-portal:
    name: Deploy partner portal
    needs: deploy-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy bx-partner-portal
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --app bx-partner-portal \
            --config apps/partner-portal/fly.toml \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.GATEWAY_URL || 'https://bx-gateway.fly.dev' }} \
            --remote-only \
            --wait-timeout 300

  # ── 5. Smoke test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: deploy-portal
    runs-on: ubuntu-latest
    steps:
      - name: Check gateway health
        run: |
          curl -f --retry 5 --retry-delay 10 \
            https://bx-gateway.fly.dev/health || exit 1

      - name: Check portal
        run: |
          curl -f --retry 5 --retry-delay 10 \
            https://bx-partner-portal.fly.dev/ || exit 1

      - name: Print URLs
        run: |
          echo "✅ Gateway:  https://bx-gateway.fly.dev"
          echo "✅ Portal:   https://bx-partner-portal.fly.dev"
